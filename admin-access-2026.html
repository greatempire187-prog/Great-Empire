<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - Great Empire</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffb703;
            --primary-hover: #fb8500;
            --dark-bg: #023047;
            --light-bg: #f8f9fa;
            --text-main: #212529;
            --text-light: #6c757d;
            --success-color: #51cf66;
            --danger-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            line-height: 1.6;
            color: var(--text-main);
            background: linear-gradient(135deg, var(--dark-bg) 0%, #011e2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .admin-header {
            margin-bottom: 2rem;
        }

        .admin-header h1 {
            color: var(--dark-bg);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .admin-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .admin-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: white;
            font-size: 2rem;
        }

        .admin-form {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--dark-bg);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 183, 3, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--dark-bg);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 133, 0, 0.3);
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .security-notice {
            background: var(--light-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .security-notice i {
            color: var(--danger-color);
            margin-right: 0.5rem;
        }

        @media (max-width: 768px) {
            .admin-container {
                padding: 2rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="admin-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h1>Admin Verification</h1>
            <p>Please verify your identity to continue</p>
        </div>

        <div id="alert" class="alert"></div>

        <form class="admin-form" onsubmit="authenticateAdmin(event)">
            <div class="form-group">
                <label for="username">Admin Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter admin username" required>
            </div>
            <button type="submit" class="btn btn-primary">
                Verify Identity <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="security-notice">
            <i class="fas fa-shield-alt"></i>
            Secure gateway. All access attempts are logged for security purposes.
        </div>
    </div>
    <script>
        // Admin authentication
        const ADMIN_USERNAME = 'chinaza';
        
        function authenticateAdmin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const alert = document.getElementById('alert');
            
            if (username === ADMIN_USERNAME) {
                // Success - redirect to admin dashboard
                alert.className = 'alert alert-success show';
                alert.textContent = 'Authentication successful! Redirecting to admin dashboard...';
                
                // Log successful access
                logAccess('SUCCESS');
                
                // Redirect after 1 second
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 1000);
                
            } else {
                // Failed authentication
                alert.className = 'alert alert-error show';
                alert.textContent = 'Invalid username. Please try again.';
                
                // Log failed access attempt
                logAccess('FAILED');
                
                // Clear input
                document.getElementById('username').value = '';
                
                // Hide alert after 3 seconds
                setTimeout(() => {
                    alert.classList.remove('show');
                }, 3000);
            }
        }
        
        function logAccess(status) {
            // Log access attempts (in production, this would go to a secure server)
            const accessLog = {
                timestamp: new Date().toISOString(),
                status: status,
                ip: 'IP_ADDRESS', // In production, get actual IP
                userAgent: navigator.userAgent
            };
            
            // Store in localStorage for demo purposes
            let logs = JSON.parse(localStorage.getItem('adminAccessLogs') || '[]');
            logs.push(accessLog);
            
            // Keep only last 50 logs
            if (logs.length > 50) {
                logs = logs.slice(-50);
            }
            
            localStorage.setItem('adminAccessLogs', JSON.stringify(logs));
        }
        
        // Clear input on page load
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('username').value = '';
        });
        
        // Prevent right-click for additional security
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Hide alert on input focus
        document.getElementById('username').addEventListener('focus', function() {
            const alert = document.getElementById('alert');
            alert.classList.remove('show');
        });
    </script>
<!-- Code Protection Script -->
    <script src="code-protection.js"></script>
</body>
</html>
