<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Empire - User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffb703;
            --primary-hover: #fb8500;
            --dark: #023047;
            --sidebar-bg: #011E2D;
            --light-bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-light: #6c757d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--light-bg);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 1.5rem;
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .nav-links {
            flex: 1;
            padding: 1.5rem 0;
            overflow-y: auto;
        }

        .nav-links a {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.05rem;
            cursor: pointer;
        }

        .nav-links a.active,
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        .nav-links svg {
            margin-right: 14px;
            flex-shrink: 0;
        }

        .back-btn {
            padding: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn a {
            display: block;
            text-align: center;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .back-btn a:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ── MAIN ── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-navbar {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
            z-index: 10;
            flex-shrink: 0;
        }

        .top-navbar h2 {
            font-weight: 800;
            color: var(--dark);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: #e0f7fa;
            color: #00838f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        /* ── SECTION TOGGLING ── */
        .section-view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .section-view.active {
            display: flex;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── CODE GALLERY ── */
        .gallery-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .gallery-toolbar {
            background: var(--card-bg);
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            border-bottom: 2px solid var(--light-bg);
            flex-shrink: 0;
        }

        .gallery-toolbar .toolbar-group {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 220px;
        }

        .gallery-toolbar label {
            font-weight: 600;
            color: var(--dark);
            white-space: nowrap;
            font-size: 0.95rem;
        }

        .gallery-toolbar input,
        .gallery-toolbar select {
            flex: 1;
            padding: 0.55rem 1rem;
            border-radius: 8px;
            border: 2px solid #e9ecef;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--dark);
            font-weight: 500;
            transition: border-color 0.2s;
            background: #fafafa;
        }

        .gallery-toolbar input:focus,
        .gallery-toolbar select:focus {
            border-color: var(--primary);
        }

        .gallery-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
        }

        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 920px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── CODE CARD ── */
        .code-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 6px 30px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .code-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.09);
        }

        .card-header {
            padding: 1.5rem 2rem 1.2rem;
            border-bottom: 2px solid var(--light-bg);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .card-header-left h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .lang-badge {
            display: inline-block;
            padding: 0.3rem 0.85rem;
            background: var(--primary);
            color: var(--dark);
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        .card-date {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
            margin-top: 0.2rem;
        }

        .card-desc {
            padding: 1rem 2rem 0;
            color: var(--text-main);
            line-height: 1.6;
            font-size: 1rem;
        }

        .code-block-wrap {
            padding: 1rem 2rem 0;
        }

        .code-block {
            background: #0d1117;
            color: #c9d1d9;
            border-radius: 10px;
            padding: 1.4rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.92rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            overflow-x: auto;
            max-height: 420px;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .card-footer {
            padding: 1rem 2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .copy-btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: var(--dark);
        }

        .copy-btn.copied {
            background: #2ecc71;
            color: white;
        }

        .run-btn {
            background: #51cf66;
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .run-btn:hover {
            background: #40a060;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(81, 207, 102, 0.3);
        }

        .run-btn:active {
            transform: translateY(0);
        }

        .share-btn {
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .share-btn:hover {
            background: #5f3dc4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        .share-btn:active {
            transform: translateY(0);
        }

        .share-btn.shared {
            background: #00b894;
            color: white;
        }

        .code-output {
            margin: 1rem 2rem 1.5rem;
            background: #1e1e1e;
            border-radius: 10px;
            border: 2px solid #333;
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }

        .output-header {
            background: #2d2d2d;
            padding: 0.8rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }

        .output-header span {
            color: #51cf66;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .close-output {
            background: none;
            border: none;
            color: #999;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .close-output:hover {
            background: #444;
            color: white;
        }

        .output-content {
            padding: 1.2rem;
            color: #d4d4d4;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 60px;
            max-height: 300px;
            overflow-y: auto;
        }

        .output-content.error {
            color: #ff6b6b;
            background: #2d1b1b;
        }

        .output-content.success {
            color: #51cf66;
            background: #1b2d1b;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                max-height: 400px;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        
        /* ---- EMPTY STATE ---- */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-light);
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .empty-state p {
            font-size: 1.05rem;
        }

        /* ── CHAT ── */
        .chat-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            overflow: hidden;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-header-bar {
            background: white;
            padding: 1.2rem 1.8rem;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--light-bg);
        }

        .chat-avatar {
            width: 46px;
            height: 46px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            margin-right: 14px;
            flex-shrink: 0;
        }

        .chat-header-bar h3 {
            color: var(--dark);
            font-weight: 800;
        }

        .chat-header-bar p {
            color: #2ecc71;
            font-size: 0.88rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-header-bar p::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            display: block;
        }

        .chat-messages {
            flex: 1;
            background: white;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .msg {
            display: flex;
            max-width: 78%;
        }

        .msg.from-user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg.from-admin {
            align-self: flex-start;
        }

        .msg-body {
            display: flex;
            flex-direction: column;
        }

        .msg-text {
            padding: 0.9rem 1.3rem;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .from-admin .msg-text {
            background: #f1f3f5;
            color: var(--text-main);
            border-top-left-radius: 4px;
        }

        .from-user .msg-text {
            background: var(--dark);
            color: white;
            border-top-right-radius: 4px;
        }

        .msg-time {
            font-size: 0.72rem;
            color: #bbb;
            margin-top: 4px;
        }

        .from-user .msg-time {
            text-align: right;
        }

        .chat-input-row {
            background: white;
            padding: 1.2rem 1.5rem;
            border-radius: 0 0 12px 12px;
            border-top: 2px solid var(--light-bg);
            display: flex;
            gap: 0.8rem;
        }

        .chat-input-row input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            border: 2px solid var(--light-bg);
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.25s;
        }

        .chat-input-row input:focus {
            border-color: var(--primary);
        }

        .chat-input-row button {
            background: var(--primary);
            color: var(--dark);
            border: none;
            padding: 0 1.6rem;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s;
        }

        .chat-input-row button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }
    </style>
</head>

                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h3>Great Empire Support</h3>
                        <p>Powered by Real Admins & AI</p>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Type your message…"
                        onkeydown="if(event.key==='Enter') sendMsg()">
                    <button onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>

    </div><!-- end .main-content -->

    <script>
        /* =========================================================
           CONSTANTS
        ========================================================= */
        const CODES_KEY = 'greatEmpireCodes';
        const CHAT_KEY = 'greatEmpireChat';

        /* =========================================================
           SECTION SWITCHING
        ========================================================= */
        function showSection(name) {
            // Hide all sections
            document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));

            if (name === 'gallery') {
                document.getElementById('section-gallery').classList.add('active');
                document.getElementById('nav-gallery').classList.add('active');
                document.getElementById('page-title').textContent = 'Code Gallery';
                renderGallery();
            } else if (name === 'chat') {
                document.getElementById('section-chat').classList.add('active');
                document.getElementById('nav-chat').classList.add('active');
                document.getElementById('page-title').textContent = 'Support Chat';
                renderChat();
            }
        }

        /* =========================================================
           CODE GALLERY
        ========================================================= */
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            if (!grid) return;

            // Load from localStorage
            let codes = [];
            try {
                codes = JSON.parse(localStorage.getItem(CODES_KEY)) || [];
            } catch (e) { codes = []; }

            const search = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
            const lang = (document.getElementById('langFilter')?.value || 'All');

            // Filter
            let filtered = codes.filter(c => {
                const matchLang = lang === 'All' || (c.lang || '').toLowerCase().includes(lang.toLowerCase()) || lang.toLowerCase().includes((c.lang || '').toLowerCase());
                const matchSearch = !search ||
                    (c.title || '').toLowerCase().includes(search) ||
                    (c.desc || '').toLowerCase().includes(search) ||
                    (c.lang || '').toLowerCase().includes(search);
                return matchLang && matchSearch;
            });

            // Most recent first
            filtered = filtered.slice().reverse();

            grid.innerHTML = '';

            if (filtered.length === 0) {
                if (codes.length === 0) {
                    grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <h3>No Code Published Yet</h3>
                        <p>The Admin has not posted any code snippets yet.<br>Check back soon!</p>
                    </div>`;
                } else {
                    grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔍</div>
                        <h3>No Results Found</h3>
                        <p>Try a different search term or language filter.</p>
                    </div>`;
                }
                return;
            }

            filtered.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'code-card';
                card.innerHTML = `
                <div class="card-header">
                    <div class="card-header-left">
                        <h3>${escHtml(item.title || 'Untitled')}</h3>
                        <span class="lang-badge">${escHtml(item.lang || 'Code')}</span>
                    </div>
                    <span class="card-date">${escHtml(item.time || '')}</span>
                </div>
                ${item.desc ? `<div class="card-desc">${escHtml(item.desc)}</div>` : ''}
                <div class="code-block-wrap">
                    <div class="code-block">${escHtml(item.code || '')}</div>
                </div>
                <div class="card-footer">
                    <button class="copy-btn" id="copybtn-${idx}" onclick="copyCode(${idx}, this)">
                        &#128221; Copy Code
                    </button>
                    <button class="run-btn" id="runbtn-${idx}" onclick="runCode(${idx}, this)">
                        &#9654; Run Code
                    </button>
                    <button class="share-btn" id="sharebtn-${idx}" onclick="shareCode(${idx}, this)">
                        &#128279; Share Link
                    </button>
                </div>
                <div class="code-output" id="output-${idx}" style="display: none;">
                    <div class="output-header">
                        <span>&#128190; Output:</span>
                        <button class="close-output" onclick="closeOutput(${idx})">&times;</button>
                    </div>
                    <div class="output-content" id="output-content-${idx}">No output yet...</div>
                </div>
            `;
                // Store code for copying
                card.dataset.code = item.code || '';
                grid.appendChild(card);
            });

            // Store filtered list globally for copy access
            window._galleryItems = filtered;
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function copyCode(idx, btn) {
            const item = window._galleryItems?.[idx];
            if (!item) return;
            navigator.clipboard.writeText(item.code || '').then(() => {
                btn.textContent = '✅ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy Code';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = item.code || '';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✅ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copy Code';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function runCode(idx, btn) {
            const item = window._galleryItems?.[idx];
            if (!item || !item.code) {
                alert('No code to execute!');
                return;
            }

            // Show loading state
            btn.textContent = 'Running...';
            btn.disabled = true;
            btn.style.background = '#ffa500';

            // Show output panel
            const outputDiv = document.getElementById(`output-${idx}`);
            const outputContent = document.getElementById(`output-content-${idx}`);
            outputDiv.style.display = 'block';
            outputContent.textContent = 'Executing code...';
            outputContent.className = 'output-content';

            // Simulate code execution with a delay
            setTimeout(() => {
                try {
                    // Create a safe execution context
                    const context = {
                        console: {
                            log: [],
                            error: [],
                            warn: [],
                            info: []
                        },
                        document: {
                            createElement: () => document.createElement('div'),
                            write: () => console.log
                        },
                        Math: Math,
                        Date: Date,
                        Array: Array,
                        Object: Object,
                        String: String,
                        Number: Number,
                        Boolean: Boolean
                    };

                    // Execute the code safely
                    const result = eval(item.code);
                    const output = typeof result === 'string' ? result : JSON.stringify(result, null, 2);

                    // Display successful output
                    outputContent.textContent = output || 'Code executed successfully (no output)';
                    outputContent.className = 'output-content success';
                    
                    // Store execution result
                    const executions = JSON.parse(localStorage.getItem('greatEmpireCodeExecutions') || '[]');
                    executions.push({
                        code: item.code,
                        output: output || 'Code executed successfully (no output)',
                        timestamp: new Date().toISOString(),
                        executedBy: 'User',
                        language: item.lang || 'Unknown'
                    });
                    localStorage.setItem('greatEmpireCodeExecutions', JSON.stringify(executions));

                } catch (error) {
                    // Display error output
                    outputContent.textContent = `Error: ${error.message}`;
                    outputContent.className = 'output-content error';
                }

                // Reset button state
                btn.textContent = 'Run Code';
                btn.disabled = false;
                btn.style.background = '';

            }, 1000); // 1 second delay to show loading state
        }

        function closeOutput(idx) {
            const outputDiv = document.getElementById(`output-${idx}`);
            outputDiv.style.display = 'none';
        }

        function shareCode(idx, btn) {
            const item = window._galleryItems?.[idx];
            if (!item) return;

            // Generate unique code ID based on title and timestamp
            const codeId = btoa(item.title + '_' + (item.time || Date.now())).replace(/[^a-zA-Z0-9]/g, '').substring(0, 12);
            
            // Create shareable URL
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            const shareUrl = `${baseUrl}/user-dashboard.html?code=${codeId}`;
            
            // Store the shared code mapping
            const sharedCodes = JSON.parse(localStorage.getItem('greatEmpireSharedCodes') || '{}');
            sharedCodes[codeId] = {
                title: item.title,
                code: item.code,
                lang: item.lang,
                desc: item.desc,
                time: item.time,
                sharedAt: new Date().toISOString()
            };
            localStorage.setItem('greatEmpireSharedCodes', JSON.stringify(sharedCodes));

            // Copy link to clipboard
            navigator.clipboard.writeText(shareUrl).then(() => {
                btn.textContent = 'Link Copied!';
                btn.classList.add('shared');
                setTimeout(() => {
                    btn.textContent = 'Share Link';
                    btn.classList.remove('shared');
                }, 2000);
            }).catch(() => {
                // Fallback for older browsers
                const ta = document.createElement('textarea');
                ta.value = shareUrl;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = 'Link Copied!';
                btn.classList.add('shared');
                setTimeout(() => {
                    btn.textContent = 'Share Link';
                    btn.classList.remove('shared');
                }, 2000);
            });
        }

        /* =========================================================
           CHAT
        ========================================================= */
        function renderChat() {
            const box = document.getElementById('chatMessages');
            if (!box) return;
            let msgs = [];
            try { msgs = JSON.parse(localStorage.getItem(CHAT_KEY)) || []; } catch (e) { }
            box.innerHTML = '';
            if (msgs.length === 0) {
                box.innerHTML = '<div style="text-align:center;color:#bbb;margin-top:2rem;">No messages yet. Say hello!</div>';
                return;
            }
            msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.sender === 'user' ? 'from-user' : 'from-admin'}`;
                div.innerHTML = `
                <div class="msg-body">
                    <div class="msg-text">${escHtml(m.text)}</div>
                    <div class="msg-time">${m.time || ''}</div>
                </div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = input?.value?.trim();
            if (!text) return;
            let msgs = [];
            try { msgs = JSON.parse(localStorage.getItem(CHAT_KEY)) || []; } catch (e) { }
            msgs.push({
                sender: 'user',
                text: text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem(CHAT_KEY, JSON.stringify(msgs));
            input.value = '';
            renderChat();
        }

        /* =========================================================
           LIVE UPDATES — listen for admin publishing new code
        ========================================================= */
        window.addEventListener('storage', e => {
            if (e.key === CODES_KEY && document.getElementById('section-gallery').classList.contains('active')) {
                renderGallery();
            }
            if (e.key === CHAT_KEY && document.getElementById('section-chat').classList.contains('active')) {
                renderChat();
            }
        });

        /* =========================================================
           SHARED CODE HANDLING
        ========================================================= */
        function handleSharedCode() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedCodeId = urlParams.get('code');
            
            if (sharedCodeId) {
                const sharedCodes = JSON.parse(localStorage.getItem('greatEmpireSharedCodes') || '{}');
                const sharedCode = sharedCodes[sharedCodeId];
                
                if (sharedCode) {
                    // Show notification about shared code
                    const notification = document.createElement('div');
                    notification.style.cssText = `
                        position: fixed;
                        top: 20px;
                        right: 20px;
                        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                        color: white;
                        padding: 1rem 1.5rem;
                        border-radius: 10px;
                        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                        z-index: 10000;
                        max-width: 400px;
                        animation: slideInRight 0.5s ease;
                    `;
                    notification.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;">
                            <span style="font-size: 1.5rem;">&#128279;</span>
                            <strong>Shared Code Found!</strong>
                        </div>
                        <div style="font-size: 0.9rem; opacity: 0.9;">
                            "${sharedCode.title}" - ${sharedCode.lang || 'Code'}
                        </div>
                        <button onclick="this.parentElement.remove(); scrollToSharedCode('${sharedCodeId}')" 
                                style="margin-top: 0.5rem; background: rgba(255,255,255,0.2); border: none; 
                                       color: white; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer;">
                            View Code
                        </button>
                    `;
                    document.body.appendChild(notification);
                    
                    // Auto-remove notification after 10 seconds
                    setTimeout(() => {
                        if (notification.parentElement) {
                            notification.remove();
                        }
                    }, 10000);
                }
            }
        }

        function scrollToSharedCode(codeId) {
            // Switch to gallery section
            showSection('gallery');
            
            // Find and highlight the shared code
            setTimeout(() => {
                const sharedCodes = JSON.parse(localStorage.getItem('greatEmpireSharedCodes') || '{}');
                const sharedCode = sharedCodes[codeId];
                
                if (sharedCode) {
                    // Find the code card in the gallery
                    const cards = document.querySelectorAll('.code-card');
                    cards.forEach((card, index) => {
                        const item = window._galleryItems?.[index];
                        if (item && item.title === sharedCode.title && item.time === sharedCode.time) {
                            // Highlight the card
                            card.style.border = '3px solid #6c5ce7';
                            card.style.boxShadow = '0 0 20px rgba(108, 92, 231, 0.5)';
                            
                            // Scroll to the card
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            
                            // Remove highlight after 3 seconds
                            setTimeout(() => {
                                card.style.border = '';
                                card.style.boxShadow = '';
                            }, 3000);
                        }
                    });
                }
            }, 500);
        }

        /* =========================================================
           INIT
        ========================================================= */
        // Seed a welcome chat message if empty
        (function seedChat() {
            let msgs = [];
            try { msgs = JSON.parse(localStorage.getItem(CHAT_KEY)) || []; } catch (e) { }
            if (msgs.length === 0) {
                msgs.push({ sender: 'admin', text: '👋 Welcome to Great Empire Support! How can we help you today?', time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
                localStorage.setItem(CHAT_KEY, JSON.stringify(msgs));
            }
        })();

        // Start on gallery
        renderGallery();
        
        // Handle shared code links
        handleSharedCode();

        
    </script>

    <!-- Inline Protection (no external file needed) -->
    <script>
        (function () {
            // Disable right-click
            document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
            // Disable F12 / Ctrl+Shift+I / Ctrl+U
            document.addEventListener('keydown', function (e) {
                if (e.keyCode === 123 ||
                    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                    (e.ctrlKey && e.keyCode === 85)) {
                    e.preventDefault();
                }
            });
        })();
    </script>
</body>
